<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A THOUGHT</title>
</head>
<body>
    <h1>A THOUGHT!</h1>
    <form action="submit.php" method="POST">
        <div>
            <label for="Name">Name</label>
            <input id="Name" name="Name" type="text" required>
        </div>
        <div>
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" required>
        </div>
        <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email">
        </div>
        <div>
            <label for="dob">DOB</label>
            <input id="dob" name="dob" type="date">
        </div>
        <div>
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Others</option>
            </select>
        </div>
        <div>
            <p>DAILY SALES INCOME</p>
            <input id="w" type="radio" name="wages" value="1k to 5k">
            <label for="w">1k to 5k</label>
            <input id="g" type="radio" name="wages" value="5k to 10k">
            <label for="g">5k to 10k</label>
            <input id="f" type="radio" name="wages" value="10k to 15k">
            <label for="f">10k to 15k</label>
            <input id="o" type="radio" name="wages" value="15k to 20k">
            <label for="o">15k to 20k</label>
        </div>
        <div>
            <p>ITEMS AVAILABLE AT THE STORE</p>
            <input type="checkbox" name="items[]" value="Rice" id="Rice"><label for="Rice">Rice</label>
            <input type="checkbox" name="items[]" value="Wheat" id="wheat"><label for="wheat">Wheat</label>
            <input type="checkbox" name="items[]" value="Milk" id="milk"><label for="milk">Milk</label>
            <input type="checkbox" name="items[]" value="Dals and Pulses" id="Dals"><label for="Dals">Dals and Pulses</label>
            <input type="checkbox" name="items[]" value="Chocolates and Candies" id="Candies"><label for="Candies">Chocolates and Candies</label>
        </div>
        <div>
            <label for="comments">Additional Comments</label>
            <textarea name="comments" id="comments"></textarea>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>
</html>
